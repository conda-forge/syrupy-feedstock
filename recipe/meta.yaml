{% set name = "syrupy" %}
{% set version = "5.3.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/syrupy-{{ version }}.tar.gz
  sha256: d4c9d4badb165a5694dcd869812717d899a8aa0b6f14f842437cb57c4ce09b3a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }},<4.0
    - pytest >=8.0.0

test:
  imports:
    - syrupy
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/syrupy-project/syrupy
  summary: Pytest Snapshot Test Utility
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - noahnu
    - ludaavics
