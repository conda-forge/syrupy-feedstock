{% set name = "syrupy" %}
{% set version = "5.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/syrupy-{{ version }}.tar.gz
  sha256: 1ea428b268301119acc1b53ff38c43fb2c13b575af2f7483c0bfc0df0399204f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - poetry-core >=2.2.1
  run:
    - python >={{ python_min }},<4.0
    - pytest >=8.0.0

test:
  imports:
    - syrupy
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/syrupy-project/syrupy
  summary: Pytest Snapshot Test Utility
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - noahnu
    - ludaavics
